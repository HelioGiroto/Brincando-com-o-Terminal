[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/barra_superior]
width = 100%
height = 24pt
radius = 6
; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
;font-0 = monospace;0
;font-0 = Noto Sans:size=11;2
font-0 = JetBrains Mono:size=10;2
font-1 = JetBrains Mono:style=Bold:size=12;2
modules-left = xworkspaces xwindow
modules-center = date
modules-right = memory cpu filesystem uptime temp battery pulseaudio network-name
;modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1


;[module/xwindow]
;type = internal/xwindow
;label = %title:0:60:...%

[module/xwindow]
type = custom/script
interval = 1
; exec = bash -c 'xdotool getwindowfocus getwindowname 2>/dev/null | awk -F" (‚ÄĒ|-) " "{print \$NF}"'
exec = bash -c 'xdotool getwindowfocus getwindowname 2>/dev/null | awk -F" (‚ÄĒ|-|‚ÄĘ|::) " "{print \\$NF}" | sed "s/^./\\U&/"'
label = %output%



[module/date]
type = internal/date
interval = 1
date = %H:%M ‚ÄĘ %d de %B
date-alt = %A, %d de %B de %Y
label = %date%
label-foreground = ${colors.primary}
label-font = 1
;click-left = sh -c 'xdg-open https://calendar.google.com'
;click-right = sh "firefox --new-tab 'https://calendar.google.com'"


[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
; label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
; label-mounted = %{F#F0C674}SSD:%{F-} %percentage_used%%
format-mounted-prefix = "SSD: "
format-mounted-prefix-foreground = ${colors.primary}
format-mounted = <label-mounted>
label-mounted = %percentage_used%%
format-unmounted = <label-unmounted>
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}



[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL: "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = MUTE
label-muted-foreground = ${colors.disabled}
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol



[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}


[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM: "
format-prefix-foreground = ${colors.primary}
format = <label>
label = %percentage_used%%



[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%


[module/uptime]
type = custom/script
interval = 30
format-prefix = "UP: "
format-prefix-foreground = ${colors.primary}
format = <label>
exec = bash -c "uptime | awk -F'up ' '{print \\$2}' | awk -F',' '{print \\$1}'"
label = %output%


[module/temp]
type = internal/temperature
interval = 5
thermal-zone = 0
format-prefix = "TEMP: "
format-prefix-foreground = ${colors.primary}
label = %temperature-c%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
poll-interval = 5
format-charging-prefix = "BAT: "
format-charging-prefix-foreground = ${colors.primary}
format-charging = <label-charging>
format-discharging-prefix = "BAT: "
format-discharging-prefix-foreground = ${colors.primary}
format-discharging = <label-discharging>
format-full-prefix = "BAT: "
format-full-prefix-foreground = ${colors.primary}
format-full = <label-full>
label-charging = %percentage%% ‚ö°
label-discharging = %percentage%%
label-full = 100%


;[network-base]
;type = internal/network
;interval = 5
;format-connected = <label-connected>
;format-disconnected = <label-disconnected>
;label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected


;[module/wlan]
;inherit = network-base
;interface-type = wireless
;label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

;[module/eth]
;inherit = network-base
;interface-type = wired
;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%


;[module/network-name]
;type = custom/script
;interval = 5
;format-prefix = "NET: "
;format-prefix-foreground = ${colors.primary}
;format = <label>
;exec = bash -c 'nmcli -t -f DEVICE,TYPE,STATE,CONNECTION device | awk -F: '\''$3=="connected"{print $4; exit}'\'''
;label = %output%


[module/network-name]
type = custom/script
interval = 5
format-prefix = "NET: "
format-prefix-foreground = ${colors.primary}
format = <label>
; exec = bash -c 'N=$(nmcli -t -f DEVICE,TYPE,STATE,CONNECTION device | awk -F: '\''$3=="connected"{print $4; exit}'\''); [ -n "$N" ] && echo "$N" || echo OFF'
exec = bash -c 'N=$(nmcli -t -f DEVICE,TYPE,STATE,CONNECTION device | awk -F: '\\''$3=="connected"{print $4; exit}'\\''); [ -n "$N" ] && echo "$N" || echo OFF'
label = %output%
click-right = lxterminal -e nmtui-connect



[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
